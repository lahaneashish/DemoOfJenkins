apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
        - name: springboot-container
          image: lahane1234/hello-word:latest   # ✅ FIXED
          imagePullPolicy: Never
          ports:
            - containerPort: 8080